spring:
  application:
    name: agent-knowledge-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/agent_knowledge}
    username: ${DB_USERNAME:agent}
    password: ${DB_PASSWORD:agent_local_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  ai-service:
    base-url: ${AI_SERVICE_BASE_URL:http://localhost:8001}
    connect-timeout: ${AI_SERVICE_CONNECT_TIMEOUT:2s}
    read-timeout: ${AI_SERVICE_READ_TIMEOUT:30s}
    mock-enabled: ${AI_SERVICE_MOCK_ENABLED:false}
